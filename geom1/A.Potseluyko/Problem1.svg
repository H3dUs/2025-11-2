<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -20 400 360" width="100%">
    <style>
        .stroke-main { stroke: #000; stroke-width: 1.5; fill: none; stroke-linejoin: round; }
        .stroke-circle { stroke: #0052cc; stroke-width: 1.2; fill: none; }
        .point { fill: #000; }
        .label { font-family: 'Times New Roman', serif; font-size: 18px; font-style: italic; font-weight: bold; fill: #000; }
        .tick { stroke: #000; stroke-width: 1.2; stroke-linecap: round; }
    </style>

    <circle cx="200" cy="199.76" r="100.24" class="stroke-circle" />
    <polygon points="50,300 350,300 200,20" class="stroke-main" />

    <g transform="translate(75, 253.3) rotate(-28)"> <line x1="0" y1="-6" x2="0" y2="6" class="tick"/> </g>
    <g transform="translate(125, 160) rotate(-28)"> <line x1="0" y1="-6" x2="0" y2="6" class="tick"/> </g>
    <g transform="translate(175, 66.7) rotate(-28)"> <line x1="0" y1="-6" x2="0" y2="6" class="tick"/> </g>

    <g transform="translate(325, 253.3) rotate(28)"> 
        <line x1="-2" y1="-6" x2="-2" y2="6" class="tick"/> <line x1="2" y1="-6" x2="2" y2="6" class="tick"/> 
    </g>
    <g transform="translate(275, 160) rotate(28)"> 
        <line x1="-2" y1="-6" x2="-2" y2="6" class="tick"/> <line x1="2" y1="-6" x2="2" y2="6" class="tick"/> 
    </g>
    <g transform="translate(225, 66.7) rotate(28)"> 
        <line x1="-2" y1="-6" x2="-2" y2="6" class="tick"/> <line x1="2" y1="-6" x2="2" y2="6" class="tick"/> 
    </g>

    <circle cx="100" cy="206.7" r="3" class="point" />
    <circle cx="150" cy="113.3" r="3" class="point" />
    <circle cx="300" cy="206.7" r="3" class="point" />
    <circle cx="250" cy="113.3" r="3" class="point" />
    
    <circle cx="50" cy="300" r="3.5" class="point" />
    <circle cx="350" cy="300" r="3.5" class="point" />
    <circle cx="200" cy="20" r="3.5" class="point" />
    <circle cx="200" cy="300" r="3.5" class="point" />

    <text x="35" y="320" class="label" text-anchor="middle">A</text>
    <text x="365" y="320" class="label" text-anchor="middle">C</text>
    <text x="200" y="10" class="label" text-anchor="middle">B</text>
    <text x="200" y="322" class="label" text-anchor="middle">K</text>
    
    <text x="75" y="210" class="label" text-anchor="end">M</text>
    <text x="125" y="115" class="label" text-anchor="end">N</text>
    <text x="320" y="210" class="label" text-anchor="start">Q</text>
    <text x="270" y="115" class="label" text-anchor="start">P</text>
</svg>